<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  {% include head.html %}
</head>
<body class="{% if page.layout == 'default' %}body-split{% else %}body-single{% endif %}">

<a class="skip-link" href="#main">Skip to content</a>

{% if page.layout == 'default' %}
<div class="layout">
  <main class="cv-pane" id="main">
    {{ content }}
  </main>
  <aside class="writing-pane" aria-label="Writing and Projects">
    {% include writing.html %}
  </aside>
</div>
{% else %}
<main class="single-pane" id="main">
  {{ content }}
</main>
{% endif %}

</body>
</html>
